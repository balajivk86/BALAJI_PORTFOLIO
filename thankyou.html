<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Balaji</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #7F77DD;
      --secondary: #5B54C7;
      --text-dark: #1A1A2E;
      --text-light: #555;
      --bg-soft: #f8f9fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top left, #fff, #f3f4f6);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text-dark);
      padding: 20px;
    }

    /* STEP 3 — FIX IMAGE OVERFLOW */
    img {
      max-width: 100%;
      height: auto;
    }

    .box {
      background: #fff;
      padding: 60px 40px;
      border-radius: 32px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      border: 1px solid #eee;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }

    /* SUCCESS ICON */
    .success-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1D9E75, #15803d);
      color: white;
      font-size: 35px;
      line-height: 80px;
      border-radius: 50%;
      margin: 0 auto 30px;
      box-shadow: 0 10px 20px rgba(29, 158, 117, 0.2);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      margin-bottom: 15px;
      letter-spacing: -1px;
    }

    p {
      color: var(--text-light);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .highlight {
      color: var(--primary);
      font-weight: 700;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 28px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(127, 119, 221, 0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(127, 119, 221, 0.3);
    }

    .small {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
      font-size: 13px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* 📱 STEP 2 & 4 — MOBILE RESPONSIVE CSS */
    @media (max-width: 768px) {
      .box {
        padding: 40px 20px;
        border-radius: 24px;
      }

      /* FIX TEXT SIZE */
      h1 { font-size: 26px; }
      p { font-size: 14px; }

      .success-icon {
        width: 60px;
        height: 60px;
        line-height: 60px;
        font-size: 25px;
        margin-bottom: 20px;
      }

      .btn {
        width: 100%;
        padding: 15px;
      }
    }
  </style>
</head>
<body>

<div class="box">
  <div class="success-icon">✓</div>
  
  <h1>🎉 Message Received!</h1>

  <p>
    Thank you for reaching out. I truly appreciate your interest in connecting.
  </p>

  <p>
    I’ll review your inquiry and get back to you within 
    <span class="highlight">24 hours</span>.
  </p>

  <p class="small">
    Developed by Balaji · 2026
  </p>

  <a href="index.html" class="btn">← Back to Portfolio</a>
</div>

</body>
</html>
